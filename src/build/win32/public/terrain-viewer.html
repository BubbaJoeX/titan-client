<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWG Terrain Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0f;
        }
        
        #viewer-container {
            width: 100vw;
            height: 100vh;
        }
        
        /* Loading screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-logo {
            font-size: 48px;
            color: #4a90d9;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(74, 144, 217, 0.5);
        }
        
        .loading-title {
            font-size: 24px;
            color: #fff;
            margin-bottom: 30px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #4a90d9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        
        /* Error screen */
        .error-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
        }
        
        .error-screen.visible {
            display: flex;
        }
        
        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .error-message {
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        .error-details {
            font-size: 14px;
            color: #888;
            max-width: 500px;
            text-align: center;
        }
        
        .error-button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #4a90d9;
            border: none;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-logo">🌍</div>
        <div class="loading-title">SWG Terrain Viewer</div>
        <div class="loading-spinner"></div>
        <div class="loading-text">Initializing viewer...</div>
    </div>
    
    <!-- Error Screen -->
    <div id="error-screen" class="error-screen">
        <div class="error-icon">⚠️</div>
        <div class="error-message">Failed to initialize terrain viewer</div>
        <div class="error-details"></div>
        <button class="error-button" onclick="location.reload()">Retry</button>
    </div>
    
    <!-- Main Viewer Container -->
    <div id="viewer-container"></div>
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- SWG Terrain Viewer -->
    <script src="/tools/swg-terrain-viewer.js"></script>
    
    <script>
        // Get scene from URL parameter or default to tatooine
        const urlParams = new URLSearchParams(window.location.search);
        const sceneName = urlParams.get('scene') || 'tatooine';
        
        // Initialize viewer when DOM is ready
        document.addEventListener('DOMContentLoaded', async () => {
            const loadingScreen = document.getElementById('loading-screen');
            const errorScreen = document.getElementById('error-screen');
            const container = document.getElementById('viewer-container');
            
            function showError(message, details = '') {
                loadingScreen.classList.add('hidden');
                errorScreen.classList.add('visible');
                errorScreen.querySelector('.error-message').textContent = message;
                errorScreen.querySelector('.error-details').textContent = details;
            }
            
            function updateLoadingText(text) {
                loadingScreen.querySelector('.loading-text').textContent = text;
            }
            
            try {
                // Check for Three.js
                if (typeof THREE === 'undefined') {
                    throw new Error('Three.js library not loaded');
                }
                
                updateLoadingText('Creating terrain viewer...');
                
                // Initialize the terrain viewer
                const viewer = new SWGTerrainViewer(container, {
                    sceneName: sceneName,
                    showGrid: true,
                    showMinimap: true,
                    showLegend: true,
                    showBuildouts: true,
                    showPlayerBuildings: true,
                    backgroundColor: 0x87ceeb,
                    terrainColor: 0xc2a366,
                });
                
                // Make viewer globally accessible for debugging
                window.terrainViewer = viewer;
                
                updateLoadingText('Loading terrain data...');
                
                // Load the initial scene
                await viewer.loadScene(sceneName);
                
                // Hide loading screen
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                }, 500);
                
                console.log('[TerrainViewer] Initialized for scene:', sceneName);
                
            } catch (error) {
                console.error('[TerrainViewer] Initialization error:', error);
                showError(
                    'Failed to initialize terrain viewer',
                    error.message
                );
            }
        });
        
        // Handle visibility changes to pause/resume rendering
        document.addEventListener('visibilitychange', () => {
            if (window.terrainViewer) {
                // Could pause/resume animation here
            }
        });
        
        // Handle unload to cleanup
        window.addEventListener('beforeunload', () => {
            if (window.terrainViewer) {
                window.terrainViewer.dispose();
            }
        });
    </script>
</body>
</html>
